name: Bug Report
description: Report a bug in release checks, metrics, Phoenix evidence, CLI, or dashboard
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in AgentGate (release authority for AI agents).

  - type: checkboxes
    attributes:
      label: Preliminary checks
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Release check (`agentgate release check`)
        - Metrics / decision engine (BLOCKED / APPROVED)
        - Phoenix evidence / spans
        - AgentPack / config validation
        - Eval pipeline (`agentgate eval`)
        - Dashboard / HTML report
        - CLI / packaging
        - CI / dev tooling
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Agent version or AgentPack path
      description: e.g. `v2.1`, `configs/agents/stability_ops`, or your custom pack
      placeholder: v2.1
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include expected vs actual behavior. For release checks, note whether the decision was wrong or artifacts were missing.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands, env vars, and evidence source (`phoenix` or `local` JSONL).
      render: shell
      placeholder: |
        export PHOENIX_COLLECTOR_ENDPOINT=...
        uv run agentgate release check --source local --evidence ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or artifact snippets
      description: CLI output, `release_decision.json`, or `metrics_summary.json` excerpts.
      render: shell
    validations:
      required: false
