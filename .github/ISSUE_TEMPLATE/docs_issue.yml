name: Documentation
description: Report unclear, missing, or incorrect documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: checkboxes
    attributes:
      label: Preliminary checks
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true

  - type: input
    id: page-url
    attributes:
      label: Doc path or URL
      description: Repo path (e.g. `docs/integration/CONNECT_YOUR_AGENT.md`) or type `NEW` for a missing page
      placeholder: docs/getting-started/RELEASE_PIPELINE.md
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      options:
        - Integrator (connect production agent)
        - Maintainer (core release pipeline)
        - Demo / reference workflow (Stability Ops pack)
        - CI / contributor setup
    validations:
      required: true

  - type: textarea
    id: what-needs-improving
    attributes:
      label: What should change?
      description: What's wrong, missing, or hard to follow?
    validations:
      required: true
